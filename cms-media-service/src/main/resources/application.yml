server:
  port: 8085
  servlet:
    context-path: /

spring:
  application:
    name: cms-media-service
  
  datasource:
    url: jdbc:postgresql://localhost:5438/mediadb?options=-c%20timezone=UTC
    username: cms_media
    password: localpassword
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MediaHikariPool
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/api/v1/auth/.well-known/jwks.json

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

cms:
  storage:
    local:
      # Use an absolute path for local development to ensure consistency
      upload-dir: C:/Users/stadmin/Desktop/CMS_NEW/uploads

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
