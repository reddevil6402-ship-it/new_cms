version: "3.9"

services:

  iamdb:
    image: postgres:16-alpine
    container_name: cms_iamdb
    environment:
      POSTGRES_DB: iamdb
      POSTGRES_USER: cms_iam
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5434:5432"       # host 5434 → container 5432
    volumes:
      - iamdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_iam -d iamdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cms_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  iamdb_data:
