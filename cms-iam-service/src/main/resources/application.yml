spring:
  application:
    name: cms-iam-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/iamdb}
    username: ${DB_USERNAME:cms_iam}
    password: ${DB_PASSWORD:localpassword}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: IamHikariPool

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema — Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: iam     # All entities map to the iam schema

  flyway:
    enabled: true
    schemas: iam
    default-schema: iam
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: 8081
  servlet:
    context-path: /

# RSA key pair for JWT signing (RS256)
# Generated at startup from key files — see JwtConfig.java
# For local dev, keys are auto-generated if not found.
# For production, mount key files as secrets.
cms:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
    access-token-ttl-seconds: 900        # 15 minutes — locked decision
    refresh-token-ttl-days: 7
    key-id: cms-key-v1                   # kid header in JWT

management:
  endpoints:
    web:
      exposure:
        include: health,info,readiness
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.cms.iam: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
