server:
  port: 8083

spring:
  application:
    name: cms-content-service

  datasource:
    url: jdbc:postgresql://localhost:5437/contentdb
    username: cms_content
    password: localpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: content

  flyway:
    enabled: true
    schemas: content
    create-schemas: true
    connect-retries: 10

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8081/api/v1/auth/.well-known/jwks.json}

logging:
  level:
    root: INFO
    com.cms.content: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── Service Endpoints for downstream clients ─────────────────────────────
cms:
  services:
    schema-url: ${SCHEMA_SERVICE_URL:http://localhost:8082}
    workflow-url: ${WORKFLOW_SERVICE_URL:http://localhost:8084}
