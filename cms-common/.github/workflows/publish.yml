name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on version tags: v1.0.0, v1.0.1, etc.

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # Required to push to GitHub Packages

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          # These configure ~/.m2/settings.xml automatically for GitHub Packages auth
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build and deploy to GitHub Packages
        run: mvn --batch-mode --no-transfer-progress deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
