server:
  port: 8084

spring:
  application:
    name: cms-workflow-service

  datasource:
    url: jdbc:postgresql://localhost:5436/workflowdb
    username: cms_workflow
    password: localpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: workflow

  flyway:
    enabled: true
    schemas: workflow
    create-schemas: true
    connect-retries: 10

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8081/api/v1/auth/.well-known/jwks.json}

logging:
  level:
    root: INFO
    com.cms.workflow: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
