<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Service Dev Console</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h1 { color: #333; }
        label { display: block; margin-top: 1rem; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 0.5rem; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { margin-top: 1.5rem; padding: 0.75rem 1.5rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #eee; padding: 1rem; border-radius: 4px; overflow-x: auto; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Form Service - Dev Testing</h1>
        <p th:text="${text}"></p>
        
        <label>Tenant ID (X-Tenant-Id)</label>
        <input type="text" id="tenantId" value="t0000000-0000-7000-8000-000000000001">

        <label>Form Code</label>
        <input type="text" id="formCode" value="contact-us">
        
        <label>Form Data (JSON)</label>
        <textarea id="formData" rows="6">{ "name": "John Doe", "email": "john@example.com", "message": "Hello world!" }</textarea>
        
        <button onclick="submitForm()">Submit Form</button>

        <h3>Result</h3>
        <pre id="result">Waiting...</pre>
    </div>

    <script>
        async function submitForm() {
            const tenantId = document.getElementById('tenantId').value;
            const code = document.getElementById('formCode').value;
            const dataStr = document.getElementById('formData').value;
            
            try {
                const dataObj = JSON.parse(dataStr);
                const response = await fetch(`/api/v1/forms/${code}/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Tenant-Id': tenantId,
                        'X-User-Id': 'u0000000-0000-7000-8000-000000000001'
                    },
                    body: JSON.stringify({ data: dataObj })
                });
                
                if (response.ok) {
                    const result = await response.json();
                    document.getElementById('result').innerText = JSON.stringify(result, null, 2);
                } else {
                    const text = await response.text();
                    document.getElementById('result').innerText = `Error ${response.status}: ${text}`;
                }
            } catch (err) {
                document.getElementById('result').innerText = err.message;
            }
        }
    </script>
</body>
</html>
