version: '3.8'

services:
  form-postgres:
    image: postgres:16-alpine
    container_name: form-postgres
    ports:
      - "5441:5432"
    environment:
      POSTGRES_USER: formuser
      POSTGRES_PASSWORD: formpassword
      POSTGRES_DB: formdb
      TZ: UTC
    volumes:
      - form_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  form_pgdata:
