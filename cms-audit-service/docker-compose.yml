services:
  auditdb:
    image: postgres:16-alpine
    container_name: cms_auditdb
    environment:
      POSTGRES_DB: auditdb
      POSTGRES_USER: cms_audit
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5440:5432"
    volumes:
      - auditdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_audit -d auditdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  auditdb_data:
