spring:
  application:
    name: cms-gateway

  autoconfigure:
    exclude:
      # cms-common's auto-config registers TenantContextFilter (servlet-based).
      # Gateway is WebFlux — jakarta.servlet.Filter does not exist on this classpath.
      # Servlet-based beans are not needed here; gateway uses its own filters.
      - com.cms.common.autoconfigure.CmsCommonAutoConfiguration

  # ── Spring Cloud Gateway routes ─────────────────────────────────────────
  cloud:
    gateway:
      # Forward the original Host header to downstream services
      default-filters:
        - RemoveRequestHeader=Cookie    # Strip cookies — downstream gets clean headers only
      routes:

        # ── IAM Service — auth endpoints (public, no JWT required) ─────────
        - id: iam-auth-public
          uri: ${IAM_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**

        # ── IAM Service — user management endpoints (JWT required) ─────────
        - id: iam-users
          uri: ${IAM_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/iam/**

        # ── Schema Service ─────────────────────────────────────────────────
        - id: schema-service
          uri: ${SCHEMA_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/schema/**

        # ── Content Service ────────────────────────────────────────────────
        - id: content-service
          uri: ${CONTENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/content/**

        # ── Workflow Service ───────────────────────────────────────────────
        - id: workflow-service
          uri: ${WORKFLOW_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/workflow/**

server:
  port: 8080

# ── CMS gateway config ─────────────────────────────────────────────────────
cms:
  iam:
    # JWKS endpoint on iam-service — gateway uses this to validate JWTs
    jwks-uri: ${IAM_JWKS_URI:http://localhost:8081/api/v1/auth/.well-known/jwks.json}

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.cms.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO

# ── Actuator ───────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
